<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" fill="none">
  <!-- Red rounded square background -->
  <rect x="0" y="8" width="144" height="144" rx="28" fill="#B91C1C"/>

  <!-- House outline (white) -->
  <path d="M72 38 L28 72 L38 72 L38 132 L106 132 L106 72 L116 72 Z"
        fill="none" stroke="white" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- House door (open rectangle at bottom center) -->
  <rect x="60" y="100" width="24" height="32" rx="2" fill="none" stroke="white" stroke-width="5"/>

  <!-- Location pin at center of house -->
  <circle cx="72" cy="86" r="14" fill="none" stroke="white" stroke-width="5"/>
  <path d="M72 100 L72 112" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Fork inside pin -->
  <line x1="68" y1="80" x2="68" y2="93" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="68" y1="80" x2="66" y2="76" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="68" y1="80" x2="70" y2="76" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Spoon inside pin -->
  <line x1="72" y1="80" x2="72" y2="93" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="72" cy="74.5" r="2.5" fill="white"/>

  <!-- Knife inside pin -->
  <line x1="76" y1="80" x2="76" y2="93" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M76 80 Q79 77 78 73 L76 74 Z" fill="white"/>

  <!-- "AnyFeast" wordmark -->
  <text x="168" y="117"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="72"
        letter-spacing="-1"
        fill="#2D2D2D">AnyFeast</text>
</svg>
